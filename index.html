<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>خريطة ياقوت الاستثمارية التفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --brand:#64090c;--primary:#9c0512;--dark:#1a0a0b;
            --sand:#efeacd;--sand-light:#f7f4e8;--highlight:#f8d794;
            --gold:#C5963A;--gd:#8B6914;--metro:#1a6b8a;
            --gn:#1A5C2A;--gr:#2d8a4e;--dirab:#5B7B6A;
            --surface:#faf8f2;--glass:rgba(255,255,255,0.88);
            --glass-border:rgba(197,150,58,0.15);
            --sh:0 8px 32px rgba(0,0,0,0.08);
            --r:14px;
        }
        body{font-family:'Tajawal',sans-serif;color:var(--dark);overflow:hidden;height:100vh;width:100vw;}

        /* ══ MAP ══ */
        #map{position:absolute;inset:0;z-index:1;}
        .leaflet-control-container .leaflet-top,.leaflet-control-container .leaflet-bottom{display:none!important;}
        .leaflet-tile-pane{filter:saturate(0.5) brightness(1.08) contrast(0.88);}

        /* ══ TOP BAR ══ */
        .topbar{
            position:fixed;top:16px;right:16px;left:16px;z-index:1000;
            display:flex;align-items:center;justify-content:space-between;
            background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1px solid var(--glass-border);border-radius:16px;
            padding:10px 20px;box-shadow:var(--sh);
        }
        .topbar-right{display:flex;align-items:center;gap:14px;}
        .topbar-logo{height:36px;}
        .topbar-title{font-size:18px;font-weight:800;color:var(--brand);}
        .topbar-sub{font-size:11px;color:var(--gd);font-weight:500;}
        .topbar-left{display:flex;align-items:center;gap:10px;}

        /* ══ BUTTONS ══ */
        .btn{
            border:none;border-radius:10px;font-family:'Tajawal';cursor:pointer;
            display:inline-flex;align-items:center;gap:6px;transition:all 0.3s;
            font-weight:600;
        }
        .btn-play{
            background:var(--brand);color:#fff;padding:10px 20px;font-size:13px;
            box-shadow:0 4px 16px rgba(100,9,12,0.2);
        }
        .btn-play:hover{background:var(--primary);transform:translateY(-1px);}
        .btn-play.playing{background:var(--gn);}
        .btn-icon{
            background:var(--glass);border:1px solid var(--glass-border);
            color:var(--brand);padding:10px 12px;font-size:16px;
            backdrop-filter:blur(12px);
        }
        .btn-icon:hover{background:rgba(255,255,255,0.95);border-color:var(--gold);}

        /* ══ ZOOM CONTROLS ══ */
        .zoom-ctrl{
            position:fixed;bottom:100px;left:16px;z-index:1000;
            display:flex;flex-direction:column;gap:4px;
        }
        .zoom-btn{
            width:42px;height:42px;border-radius:12px;border:1px solid var(--glass-border);
            background:var(--glass);backdrop-filter:blur(12px);
            display:flex;align-items:center;justify-content:center;
            font-size:20px;font-weight:700;color:var(--brand);cursor:pointer;
            transition:all 0.2s;
        }
        .zoom-btn:hover{background:#fff;border-color:var(--gold);}

        /* ══ LEGEND PANEL ══ */
        .legend-panel{
            position:fixed;bottom:16px;right:16px;z-index:1000;
            background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1px solid var(--glass-border);border-radius:var(--r);
            padding:16px 18px;box-shadow:var(--sh);
            min-width:220px;transition:all 0.4s;
        }
        .legend-panel.collapsed{padding:10px 16px;min-width:auto;}
        .legend-panel.collapsed .leg-body{display:none;}
        .leg-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:10px;}
        .leg-header h4{font-size:13px;font-weight:700;color:var(--brand);}
        .leg-toggle{font-size:14px;color:var(--gd);background:none;border:none;cursor:pointer;}
        .leg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;font-weight:500;color:#555;}
        .leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
        .leg-line{width:18px;height:3px;border-radius:2px;flex-shrink:0;}
        .leg-dash{width:18px;border-top:2.5px dashed;flex-shrink:0;}

        /* ══ JOURNEY PROGRESS ══ */
        .journey-bar{
            position:fixed;bottom:16px;right:260px;left:70px;z-index:1000;
            background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1px solid var(--glass-border);border-radius:var(--r);
            padding:12px 18px;box-shadow:var(--sh);
            display:flex;align-items:center;gap:10px;
        }
        .j-stops{display:flex;align-items:center;gap:0;flex:1;position:relative;}
        .j-dot{
            width:26px;height:26px;border-radius:50%;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;
            font-size:8px;font-weight:800;color:#fff;cursor:pointer;
            transition:all 0.3s;position:relative;z-index:2;
            border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.15);
        }
        .j-dot:hover{transform:scale(1.2);}
        .j-dot.active{transform:scale(1.3);box-shadow:0 4px 16px rgba(0,0,0,0.2);}
        .j-dot .j-tip{
            position:absolute;bottom:calc(100% + 8px);right:50%;transform:translateX(50%);
            background:var(--dark);color:#fff;padding:4px 10px;border-radius:6px;
            font-size:10px;font-weight:600;white-space:nowrap;opacity:0;
            transition:opacity 0.2s;pointer-events:none;
        }
        .j-dot:hover .j-tip,.j-dot.active .j-tip{opacity:1;}
        .j-line{flex:1;height:3px;background:rgba(0,0,0,0.06);border-radius:2px;position:relative;}
        .j-line-fill{position:absolute;top:0;right:0;height:100%;background:var(--gold);border-radius:2px;transition:width 0.6s;}

        /* ══ INFO CARD (slide-in) ══ */
        .info-overlay{
            position:fixed;top:0;right:-460px;width:440px;height:100vh;z-index:2000;
            transition:right 0.5s cubic-bezier(0.4,0,0.2,1);
        }
        .info-overlay.open{right:0;}
        .info-backdrop{
            position:fixed;inset:0;background:rgba(0,0,0,0.15);z-index:1999;
            opacity:0;visibility:hidden;transition:all 0.4s;
        }
        .info-backdrop.open{opacity:1;visibility:visible;}
        .info-card{
            width:100%;height:100%;background:var(--surface);
            box-shadow:-8px 0 40px rgba(0,0,0,0.1);
            overflow-y:auto;overflow-x:hidden;
        }
        .info-close{
            position:absolute;top:16px;left:16px;z-index:10;
            width:36px;height:36px;border-radius:50%;background:var(--glass);
            border:1px solid var(--glass-border);display:flex;align-items:center;
            justify-content:center;cursor:pointer;font-size:18px;color:var(--brand);
            transition:all 0.3s;
        }
        .info-close:hover{background:#fff;border-color:var(--brand);}
        .info-img{width:100%;height:220px;object-fit:cover;display:block;}
        .info-zone-badge{
            display:inline-flex;align-items:center;gap:5px;padding:5px 14px;
            border-radius:16px;font-size:11px;font-weight:700;margin-bottom:12px;
        }
        .info-body{padding:24px 28px;}
        .info-name{font-size:32px;font-weight:900;margin-bottom:4px;}
        .info-en{font-size:14px;color:#aaa;margin-bottom:14px;direction:ltr;}
        .info-desc{font-size:15px;color:#666;line-height:1.8;margin-bottom:18px;}
        .info-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
        .info-stat{background:var(--cream);border-radius:10px;padding:12px 14px;text-align:center;}
        .is-val{font-size:22px;font-weight:900;direction:ltr;display:inline-block;}
        .is-label{font-size:10px;color:#999;margin-top:2px;}
        .info-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
        .info-chip{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(0,0,0,0.03);}
        .info-price-box{
            border-radius:12px;padding:16px 20px;margin-top:12px;
            display:flex;align-items:center;gap:16px;
        }
        .ip-val{font-size:32px;font-weight:900;direction:ltr;display:inline-block;}
        .ip-arrow{font-size:20px;opacity:0.3;}
        .ip-unit{font-size:10px;color:#999;display:block;margin-top:2px;}
        .info-nav{display:flex;gap:8px;padding:16px 28px;border-top:1px solid rgba(0,0,0,0.04);}
        .info-nav-btn{
            flex:1;padding:10px;border-radius:8px;border:1px solid rgba(0,0,0,0.06);
            background:#fff;font-family:'Tajawal';font-size:12px;font-weight:600;
            cursor:pointer;text-align:center;transition:all 0.2s;color:var(--brand);
        }
        .info-nav-btn:hover{background:var(--sand);border-color:var(--gold);}

        /* ══ STATS PANEL (top-left) ══ */
        .stats-panel{
            position:fixed;top:80px;right:16px;z-index:1000;
            display:flex;gap:8px;
        }
        .sp-card{
            background:var(--glass);backdrop-filter:blur(16px);
            border:1px solid var(--glass-border);border-radius:12px;
            padding:10px 16px;text-align:center;min-width:80px;
            box-shadow:0 4px 16px rgba(0,0,0,0.04);
        }
        .sp-val{font-size:22px;font-weight:900;color:var(--brand);direction:ltr;display:inline-block;}
        .sp-label{font-size:9px;color:#999;margin-top:2px;}

        /* ══ CUSTOM MAP MARKERS ══ */
        .map-node{
            transition:transform 0.3s;cursor:pointer;
        }
        .map-node:hover{transform:scale(1.15);}
        .node-dot{
            width:32px;height:32px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:11px;font-weight:800;color:#fff;
            border:3px solid #fff;
            box-shadow:0 3px 12px rgba(0,0,0,0.3);
            transition:all 0.3s;
        }
        .node-dot.active{
            width:40px;height:40px;font-size:13px;
            box-shadow:0 4px 20px rgba(0,0,0,0.35);
        }
        .node-dot.key{width:36px;height:36px;font-size:12px;border-width:3px;}
        .node-label{
            background:rgba(255,255,255,0.94);border-radius:6px;
            padding:4px 10px;box-shadow:0 2px 8px rgba(0,0,0,0.12);
            border:1px solid rgba(0,0,0,0.06);white-space:nowrap;
            font-size:12px;font-weight:700;line-height:1.3;
            position:absolute;
        }
        .node-connector{
            position:absolute;pointer-events:none;overflow:visible;
        }

        /* Pulse animation for active */
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(156,5,18,0.3);}50%{box-shadow:0 0 0 12px rgba(156,5,18,0);}}
        .node-dot.active{animation:pulse 2s infinite;}

        /* ══ SCROLLBAR ══ */
        .info-card::-webkit-scrollbar{width:4px;}
        .info-card::-webkit-scrollbar-track{background:transparent;}
        .info-card::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px;}
    </style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div class="topbar">
    <div class="topbar-right">
        <img src="https://i.ibb.co/Y7kgwmgn/Yaqoot-Logo.png" alt="ياقوت" class="topbar-logo">
        <div>
            <div class="topbar-title">خريطة ياقوت الاستثمارية</div>
            <div class="topbar-sub">ممر نمو غرب الرياض · من الإرث إلى الفرصة</div>
        </div>
    </div>
    <div class="topbar-left">
        <button class="btn btn-play" id="playBtn" onclick="toggleJourney()">
            <span id="playIcon">▶</span> <span id="playText">تشغيل الرحلة</span>
        </button>
        <button class="btn btn-icon" onclick="resetView()" title="إعادة ضبط">⟳</button>

</div>

<!-- ══ STATS PANEL ══ -->
<div class="stats-panel">

    <div class="sp-card"><div class="sp-val">360</div><div class="sp-label">كم² القدية</div></div>
    <div class="sp-card"><div class="sp-val">2034</div><div class="sp-label">كأس العالم</div></div>
</div>

<!-- ══ MAP ══ -->
<div id="map"></div>

<!-- ══ ZOOM CONTROLS ══ -->
<div class="zoom-ctrl">
    <button class="zoom-btn" onclick="map.zoomIn()">+</button>

</div>

<!-- ══ LEGEND PANEL ══ -->
<div class="legend-panel" id="legendPanel">

        <div class="leg-row"><span class="leg-dot" style="background:var(--primary)"></span>منطقة التحول (04–06)</div>
        <div class="leg-row"><span class="leg-dot" style="background:var(--gn)"></span>منطقة التوسع (07–11)</div>
        <div class="leg-row"><span class="leg-dot" style="background:var(--gd)"></span>منطقة الفرص (12–15)</div>
        <div style="height:6px;"></div>
        <div class="leg-row"><span class="leg-line" style="background:var(--primary)"></span>مسار الاستثمار</div>
        <div class="leg-row"><span class="leg-dash" style="border-color:var(--metro)"></span>خط المترو 7</div>
        <div class="leg-row"><span class="leg-dash" style="border-color:var(--dirab)"></span>محور ديراب 🐎</div>
        <div class="leg-row"><span class="leg-dash" style="border-color:#888"></span>طرق رئيسية</div>
    </div>
</div>

<!-- ══ JOURNEY BAR ══ -->
<div class="journey-bar" id="journeyBar"></div>

<!-- ══ INFO CARD OVERLAY ══ -->
<div class="info-backdrop" id="infoBg" onclick="closeInfo()"></div>
<div class="info-overlay" id="infoPanel">
    <div class="info-card" id="infoCard">
        <button class="info-close" onclick="closeInfo()">✕</button>
        <div id="infoContent"></div>
    </div>
</div>

            id:9, num:'09', name:'مخططات زهرة الربيع', en:'Zahrat Al-Rabee', zone:'e', key:false, ldir:'topleft',
            lat:24.5053113, lng:45.9982314, elev:'630م',
            img:'https://lh3.googleusercontent.com/gps-cs-s/AHVAweqWrJhz35MChq5MoE7DzI48xCWwnYys34PAYc0XRbNdfFi52EuiYYiqxzd72Li85p91hDJt5Emj6cRzN_T0tXuXdhbeP-PLDPNhw34P4nctx_Atj-1PQinyLBec5wIzxWO16npFQg=w408-h544-k-no',
            desc:'المرحلة 1 و2. جبهة التوسع العمراني الجديدة غرب الرياض.',
            chips:['🏗 المرحلة 1 و2','📍 630م'],
            dist:'من الرياض: 78 كم',
            zoneName:'التوسع', zoneIcon:'🏗'
        },
        {
            id:10, num:'10', name:'طريق الرياض - مكة المكرمة السريع', en:'Riyadh-Makkah Highway', zone:'e', key:false, ldir:'bottom',
            lat:24.5021111, lng:46.3391111, elev:'620م',
            img:'https://media.gettyimages.com/id/117333082/photo/riyadh-to-makkah-road-through-tuwaiq-mountains.jpg?s=1024x1024&w=gi&k=20&c=VEJ_y62xT0GdbYHXSXKz0BAKInfZrJIqgfZ_l-aek4s=',
            desc:'الطريق السريع الرئيسي الرابط بين العاصمة والمنطقة الغربية. شريان حيوي يعزز قيمة الممر.',
            chips:['🛣 طريق سريع','📍 620م'],
            dist:'يربط: الرياض ← مكة المكرمة',
            zoneName:'التوسع', zoneIcon:'🛣'
        },
        {
            id:11, num:'11', name:'طريق مرات - شقراء - الدوادمي', en:'Marat-Shaqra-Dawadmi Rd', zone:'e', key:false, ldir:'top',
            lat:24.6285833, lng:46.0711667, elev:'620م',
            img:'https://i.ibb.co/JRXHtd5n/Al-Khalayiq-Road.png',
            desc:'شريان إقليمي يربط الممر بوسط الجزيرة العربية. ممر التوسع الغربي.',
            chips:['🛣 إقليمي','📍 620م'],
            dist:'يربط: مرات · شقراء · الدوادمي',
            zoneName:'التوسع', zoneIcon:'🛣'
        },
        {
            id:12, num:'12', name:'طريق الخلايق', en:'Al-Khalayiq Road', zone:'o', key:false, ldir:'left',
            lat:24.3409444, lng:45.8051389, elev:'600م',
            img:'https://i.ibb.co/JRXHtd5n/Al-Khalayiq-Road.png',
            desc:'طريق مباشر إلى الجلة من الممر. الوصلة الرئيسية بين ممر التوسع والوجهة الاستثمارية النهائية.',
            chips:['🛣 وصول مباشر','📍 600م','← الجلة'],
            dist:'إلى الجلة: 12 كم',
            zoneName:'الفرص', zoneIcon:'🛣'
        },
        {
            id:13, num:'13', name:'مخططات العارضية', en:'Al Aridhiyah (Um Al-Khair)', zone:'o', key:false, ldir:'right',
            lat:24.6207778, lng:46.1773611, elev:'615م',
            img:'https://i.ibb.co/BVtVzjsg/Al-Ardiyah.png',
            desc:'مؤشر الاستثمار في الممر. سوق منظم وفرص مستقرة. مخططات العارضية ( أ ، ب ، ج ، د ، و ).',
            chips:['💰 استثمار','📍 615م','🛣 طريق سريع'],
            price:{old:'8',new:'200',unit:'ريال / م²',roi:'20×'},
            dist:'وصول طريق سريع',
            zoneName:'الفرص', zoneIcon:'💰'
        },
        {
            id:14, num:'14', name:'الجلة', en:'Al Jella — Final Destination', zone:'o', key:true, ldir:'botright',
            lat:24.3467778, lng:45.8338056, elev:'585م',
            img:'https://i.ibb.co/pjJC6yCM/Al-Jella.png',
            desc:'نهاية ممر نمو غرب الرياض. أرض بأسعار استثمارية مميزة على المسار. الوجهة النهائية — بداية الفرصة الحقيقية.',
            chips:['🏁 نهاية الممر','📍 585م','~80 كم من الرياض'],
            price:{old:'8',new:'40',unit:'ريال / م²',roi:'5×'},
            dist:'~80 كم من الرياض',
            zoneName:'الفرص', zoneIcon:'🏁'
        },
        {
            id:15, num:'15', name:'مخططات الجلة', en:'Al Jella Plans', zone:'o', key:false, ldir:'left',
            lat:24.49525, lng:45.7273889, elev:'580م',
            img:'https://i.ibb.co/VYmwcM6g/plan-521.png',
            desc:'تخطيط الأراضي ومناطق البيع. المخططات المتاحة للاستثمار في الجلة.',
            chips:['📋 مخططات','📍 580م'],
            dist:'مناطق البيع المتاحة',
            zoneName:'الفرص', zoneIcon:'📋'
        }
    ];

    const zoneColors = {h:'#64090c',t:'#9c0512',e:'#1A5C2A',o:'#8B6914'};
    const zoneBgs = {h:'rgba(100,9,12,0.06)',t:'rgba(156,5,18,0.06)',e:'rgba(26,92,42,0.06)',o:'rgba(139,105,20,0.06)'};
    const zoneNames = {h:'التراث',t:'التحول',e:'التوسع',o:'الفرص'};

    // ════════════════════════════════════════════
    // MAP INIT
    // ════════════════════════════════════════════
    const map = L.map('map',{
        zoomControl:false,attributionControl:false,
        minZoom:9,maxZoom:15
    });

    L.tileLayer('https://mt{s}.google.com/vt/lyrs=p&x={x}&y={y}&z={z}',{
        subdomains:['0','1','2','3'],maxZoom:20
    }).addTo(map);

    const bounds = L.latLngBounds(locations.map(l=>[l.lat,l.lng]));
    map.fitBounds(bounds.pad(0.08));

    // ── Zone polygons ──
    [
        {coords:[[24.54,46.40],[24.83,46.40],[24.83,46.60],[24.54,46.60]],c:'#64090c'},
        {coords:[[24.48,46.22],[24.63,46.22],[24.63,46.55],[24.48,46.55]],c:'#9c0512'},
        {coords:[[24.42,45.90],[24.66,45.90],[24.66,46.33],[24.42,46.33]],c:'#2d8a4e'},
        {coords:[[24.28,45.68],[24.50,45.68],[24.50,45.91],[24.28,45.91]],c:'#8B6914'},
    ].forEach(z=>L.polygon(z.coords,{color:z.c,weight:1.5,opacity:.3,fillColor:z.c,fillOpacity:.05}).addTo(map));

    // ── Route polyline ──
    const routeCoords = locations.map(l=>[l.lat,l.lng]);
    L.polyline(routeCoords,{color:'#9c0512',weight:4,opacity:.45,dashArray:'14,8'}).addTo(map);

    // ── Metro Line 7 ──
    L.polyline([[24.748,46.536],[24.718,46.484],[24.648,46.416],[24.598,46.365],[24.572,46.312]],{color:'#1a6b8a',weight:4,opacity:.5,dashArray:'16,7'}).addTo(map);

    // ── Dirab axis ──
    L.polyline([[24.530,46.42],[24.510,46.41],[24.495,46.405],[24.481,46.399]],{color:'#5B7B6A',weight:3,opacity:.35,dashArray:'10,6'}).addTo(map);
    const dirabIcon = L.divIcon({
        html:`<div style="position:relative;width:0;height:0;">
    <div style="position:absolute;left:-16px;top:-16px;width:32px;height:32px;background:rgba(91,123,106,0.9);border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 12px rgba(0,0,0,0.3);cursor:pointer;">🐎</div>
    <div style="position:absolute;left:22px;top:-14px;background:rgba(255,255,255,0.94);border-radius:6px;padding:4px 10px;box-shadow:0 2px 8px rgba(0,0,0,0.12);border:1px solid rgba(91,123,106,0.15);white-space:nowrap;">
      <div style="font-family:Tajawal;font-size:11px;font-weight:700;color:#3D5A4A;">🐎 مركز الخيل العربية</div>
      <div style="font-family:Tajawal;font-size:9px;color:#999;">محور ديراب</div>
    </div>
  </div>`,
        className:'',iconSize:[1,1],iconAnchor:[0,0]
    });
    L.marker([24.480924,46.398655],{icon:dirabIcon}).addTo(map);

    // ════════════════════════════════════════════
    // MARKERS
    // ════════════════════════════════════════════
    const markers = [];

    locations.forEach((loc,i)=>{
        const c = zoneColors[loc.zone];
        const s = loc.key ? 36 : 30;
        const gap = 12;
        const w = loc.name.length * 8 + 18;
        const h = 24, hy = h/2;
        let lx,ly;
        switch(loc.ldir){
            case'right':lx=s/2+gap;ly=-hy;break;
            case'left':lx=-(s/2+gap+w);ly=-hy;break;
            case'top':lx=-(w/2);ly=-(s/2+gap+h);break;
            case'bottom':lx=-(w/2);ly=s/2+gap;break;
            case'topleft':lx=-(w+gap);ly=-(s/2+gap+h);break;
            case'topright':lx=s/2+gap;ly=-(s/2+gap+h);break;
            case'botleft':lx=-(w+gap);ly=s/2+gap;break;
            case'botright':lx=s/2+gap;ly=s/2+gap;break;
            default:lx=s/2+gap;ly=-hy;
        }
        const clx=lx+w/2, cly=ly+hy;

        const icon = L.divIcon({
            html:`<div class="map-node" onclick="openInfo(${i})" style="position:relative;width:0;height:0;">
      <svg class="node-connector" style="position:absolute;left:${Math.min(0,clx)-5}px;top:${Math.min(0,cly)-5}px;width:${Math.abs(clx)+w}px;height:${Math.abs(cly)+h}px;overflow:visible;">
        <line x1="${-Math.min(0,clx)+5}" y1="${-Math.min(0,cly)+5}" x2="${clx-Math.min(0,clx)+5}" y2="${cly-Math.min(0,cly)+5}" stroke="${c}" stroke-width="1" stroke-opacity="0.18" stroke-dasharray="3,3"/>
      </svg>
      <div class="node-dot ${loc.key?'key':''}" id="dot-${i}" style="position:absolute;left:${-s/2}px;top:${-s/2}px;width:${s}px;height:${s}px;background:${c};">${loc.num}</div>
      <div class="node-label" style="left:${lx}px;top:${ly}px;color:${c};">${loc.name}</div>
    </div>`,
            className:'',iconSize:[1,1],iconAnchor:[0,0]
        });
        const m = L.marker([loc.lat,loc.lng],{icon}).addTo(map);
        markers.push(m);
    });

    // ════════════════════════════════════════════
    // INFO CARD
    // ════════════════════════════════════════════
    let currentInfo = -1;

    function openInfo(idx){
        currentInfo = idx;
        const loc = locations[idx];
        const c = zoneColors[loc.zone];
        const bg = zoneBgs[loc.zone];

        let html = `<img class="info-img" src="${loc.img}" alt="${loc.name}" onerror="this.style.background='var(--cream)';this.style.height='120px';">`;
        html += `<div class="info-body">`;
        html += `<div class="info-zone-badge" style="background:${bg};color:${c};">${loc.zoneIcon} ${loc.num} · ${loc.zoneName}</div>`;
        html += `<div class="info-name" style="color:${c};">${loc.name}</div>`;
        html += `<div class="info-en">${loc.en}</div>`;
        html += `<div class="info-desc">${loc.desc}</div>`;

        if(loc.stats){
            html += `<div class="info-stats">`;
            loc.stats.forEach(s=>{html+=`<div class="info-stat"><div class="is-val" style="color:${c};">${s.v}</div><div class="is-label">${s.l}</div></div>`;});
            html += `</div>`;
        }

        if(loc.price){
            html += `<div class="info-price-box" style="background:${bg};">
      <div><div class="ip-val" style="color:var(--text-light);">${loc.price.old}</div><div class="ip-unit">سابقاً</div></div>
      <div class="ip-arrow">←</div>
      <div><div class="ip-val" style="color:${c};">${loc.price.new}</div><div class="ip-unit">اليوم</div></div>
      <div style="margin-right:auto;"><div style="font-size:28px;font-weight:900;color:${c};opacity:0.6;">${loc.price.roi}</div><div class="ip-unit">نمو</div></div>
    </div>`;
            html += `<div style="text-align:center;font-size:11px;color:var(--text-light);margin-top:4px;">${loc.price.unit}</div>`;
        }

        html += `<div class="info-chips">`;
        loc.chips.forEach(ch=>{html+=`<div class="info-chip">${ch}</div>`;});
        html += `</div>`;

        html += `<div style="font-size:12px;color:var(--text-light);margin-top:8px;">${loc.dist}</div>`;
        html += `<div style="font-size:11px;color:var(--text-light);margin-top:4px;">الارتفاع: ${loc.elev}</div>`;
        html += `</div>`;

        html += `<div class="info-nav">`;
        if(idx>0) html+=`<button class="info-nav-btn" onclick="openInfo(${idx-1})">→ ${locations[idx-1].name}</button>`;
        if(idx<locations.length-1) html+=`<button class="info-nav-btn" onclick="openInfo(${idx+1})">${locations[idx+1].name} ←</button>`;
        html += `</div>`;

        document.getElementById('infoContent').innerHTML = html;
        document.getElementById('infoPanel').classList.add('open');
        document.getElementById('infoBg').classList.add('open');

        // Highlight dot
        document.querySelectorAll('.node-dot').forEach(d=>d.classList.remove('active'));
        const dot = document.getElementById('dot-'+idx);
        if(dot) dot.classList.add('active');

        // Fly to
        map.flyTo([loc.lat,loc.lng],12,{duration:1});

        updateJourneyDots(idx);
    }

    function closeInfo(){
        document.getElementById('infoPanel').classList.remove('open');
        document.getElementById('infoBg').classList.remove('open');
        document.querySelectorAll('.node-dot').forEach(d=>d.classList.remove('active'));
        currentInfo = -1;
    }

    // ════════════════════════════════════════════
    // JOURNEY BAR
    // ════════════════════════════════════════════
    function buildJourneyBar(){
        const bar = document.getElementById('journeyBar');
        let html = '';
        locations.forEach((loc,i)=>{
            const c = zoneColors[loc.zone];
            html += `<div class="j-dot" id="jdot-${i}" style="background:${c};" onclick="openInfo(${i})">${loc.num}<div class="j-tip">${loc.name}</div></div>`;
            if(i < locations.length-1) html += `<div class="j-line"><div class="j-line-fill" id="jfill-${i}" style="width:0%;"></div></div>`;
        });
        bar.innerHTML = html;
    }
    buildJourneyBar();

    function updateJourneyDots(idx){
        document.querySelectorAll('.j-dot').forEach((d,i)=>{
            d.classList.toggle('active',i===idx);
        });
        // Fill lines up to idx
        for(let i=0;i<locations.length-1;i++){
            const fill = document.getElementById('jfill-'+i);
            if(fill) fill.style.width = i < idx ? '100%' : '0%';
        }
    }

    // ════════════════════════════════════════════
    // JOURNEY PLAYBACK
    // ════════════════════════════════════════════
    let journeyPlaying = false;
    let journeyTimer = null;
    let journeyIdx = 0;

    function toggleJourney(){
        if(journeyPlaying){
            stopJourney();
        } else {
            startJourney();
        }
    }

    function startJourney(){
        journeyPlaying = true;
        journeyIdx = 0;
        const btn = document.getElementById('playBtn');
        btn.classList.add('playing');
        document.getElementById('playIcon').textContent = '⏸';
        document.getElementById('playText').textContent = 'إيقاف الرحلة';
        playStep();
    }

    function stopJourney(){
        journeyPlaying = false;
        clearTimeout(journeyTimer);
        const btn = document.getElementById('playBtn');
        btn.classList.remove('playing');
        document.getElementById('playIcon').textContent = '▶';
        document.getElementById('playText').textContent = 'تشغيل الرحلة';
    }

    function playStep(){
        if(!journeyPlaying || journeyIdx >= locations.length){
            stopJourney();
            return;
        }
        openInfo(journeyIdx);
        journeyIdx++;
        journeyTimer = setTimeout(playStep, 4000);
    }

    // ════════════════════════════════════════════
    // UTILITIES
    // ════════════════════════════════════════════
    function resetView(){
        closeInfo();
        stopJourney();
        map.fitBounds(bounds.pad(0.08),{duration:1});
        updateJourneyDots(-1);
    }

    function toggleLegend(){
        const panel = document.getElementById('legendPanel');
        const toggle = document.getElementById('legToggle');
        panel.classList.toggle('collapsed');
        toggle.textContent = panel.classList.contains('collapsed') ? '▲' : '▼';
    }
</script>
</body>
</html>
