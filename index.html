<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>خريطة ياقوت الاستثمارية التفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --brand:#64090c;--primary:#9c0512;--dark:#1a0a0b;
            --sand:#efeacd;--sand-light:#f7f4e8;--highlight:#f8d794;--cream:#f5f0e1;
            --gold:#C5963A;--gd:#8B6914;--metro:#1a6b8a;
            --gn:#1A5C2A;--gr:#2d8a4e;--dirab:#5B7B6A;
            --surface:#faf8f2;
            --glass:rgba(255,255,255,0.9);--glass-border:rgba(197,150,58,0.15);
            --sh:0 6px 24px rgba(0,0,0,0.07);--r:12px;
        }
        html{-webkit-text-size-adjust:100%;}
        body{font-family:'Tajawal',sans-serif;color:var(--dark);overflow:hidden;height:100vh;height:100dvh;width:100vw;position:relative;}

        /* ══ MAP ══ */
        #map{position:absolute;inset:0;z-index:1;}
        .leaflet-control-container .leaflet-top,.leaflet-control-container .leaflet-bottom{display:none!important;}
        .leaflet-tile-pane{filter:saturate(0.5) brightness(1.08) contrast(0.88);}

        /* ══ TOP BAR ══ */
        .topbar{
            position:fixed;top:0;right:0;left:0;z-index:1000;
            display:flex;align-items:center;justify-content:space-between;
            background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid var(--glass-border);
            padding:8px 20px;box-shadow:var(--sh);
        }
        .topbar-right{display:flex;align-items:center;gap:12px;}
        .topbar-logo{height:34px;}
        .topbar-title{font-size:16px;font-weight:800;color:var(--brand);}
        .topbar-sub{font-size:10px;color:var(--gd);font-weight:500;}
        .topbar-left{display:flex;align-items:center;gap:8px;}

        /* ══ STATS (inside topbar, not separate) ══ */
        .topbar-stats{display:flex;gap:6px;margin-right:auto;margin-left:16px;}
        .ts{
            background:var(--sand-light);border:1px solid var(--glass-border);
            border-radius:8px;padding:4px 12px;text-align:center;
        }
        .ts-val{font-size:16px;font-weight:900;color:var(--brand);direction:ltr;display:inline-block;}
        .ts-label{font-size:8px;color:var(--gd);display:block;}

        /* ══ BUTTONS ══ */
        .btn{border:none;border-radius:8px;font-family:'Tajawal';cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.3s;font-weight:600;}
        .btn-play{background:var(--brand);color:#fff;padding:8px 16px;font-size:12px;box-shadow:0 3px 12px rgba(100,9,12,0.2);}
        .btn-play:hover{background:var(--primary);}
        .btn-play.playing{background:var(--gn);}
        .btn-icon{background:var(--glass);border:1px solid var(--glass-border);color:var(--brand);padding:8px 10px;font-size:14px;backdrop-filter:blur(12px);}
        .btn-icon:hover{background:#fff;border-color:var(--gold);}

        /* ══ ZOOM ══ */
        .zoom-ctrl{position:fixed;bottom:80px;left:12px;z-index:1000;display:flex;flex-direction:column;gap:3px;}
        .zoom-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--brand);cursor:pointer;transition:all 0.2s;}
        .zoom-btn:hover{background:#fff;border-color:var(--gold);}

        /* ══ LEGEND ══ */
        .legend-panel{position:fixed;bottom:12px;right:12px;z-index:1000;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh);min-width:200px;transition:all 0.4s;}
        .legend-panel.collapsed{padding:8px 12px;min-width:auto;}
        .legend-panel.collapsed .leg-body{display:none;}
        .leg-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:8px;}
        .leg-header h4{font-size:12px;font-weight:700;color:var(--brand);}
        .leg-toggle{font-size:12px;color:var(--gd);background:none;border:none;cursor:pointer;}
        .leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:10px;font-weight:500;color:#555;}
        .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
        .leg-line{width:16px;height:3px;border-radius:2px;flex-shrink:0;}
        .leg-dash{width:16px;border-top:2px dashed;flex-shrink:0;}

        /* ══ JOURNEY BAR ══ */
        .journey-bar{position:fixed;bottom:12px;right:230px;left:60px;z-index:1000;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--r);padding:10px 14px;box-shadow:var(--sh);display:flex;align-items:center;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
        .journey-bar::-webkit-scrollbar{height:0;}
        .j-stops{display:flex;align-items:center;gap:0;flex:1;min-width:0;}
        .j-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#fff;cursor:pointer;transition:all 0.3s;position:relative;z-index:2;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.12);}
        .j-dot:hover{transform:scale(1.15);}
        .j-dot.active{transform:scale(1.25);box-shadow:0 3px 12px rgba(0,0,0,0.2);}
        .j-dot .j-tip{position:absolute;bottom:calc(100% + 6px);right:50%;transform:translateX(50%);background:var(--dark);color:#fff;padding:3px 8px;border-radius:5px;font-size:9px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none;}
        .j-dot:hover .j-tip,.j-dot.active .j-tip{opacity:1;}
        .j-line{flex:1;height:2px;background:rgba(0,0,0,0.05);border-radius:2px;min-width:8px;position:relative;}
        .j-line-fill{position:absolute;top:0;right:0;height:100%;background:var(--gold);border-radius:2px;transition:width 0.6s;}

        /* ══ INFO CARD ══ */
        .info-overlay{position:fixed;top:0;right:-100%;width:420px;max-width:100vw;height:100vh;height:100dvh;z-index:2000;transition:right 0.45s cubic-bezier(0.4,0,0.2,1);}
        .info-overlay.open{right:0;}
        .info-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.12);z-index:1999;opacity:0;visibility:hidden;transition:all 0.3s;}
        .info-backdrop.open{opacity:1;visibility:visible;}
        .info-card{width:100%;height:100%;background:var(--surface);box-shadow:-6px 0 32px rgba(0,0,0,0.08);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
        .info-close{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.04);}
        .info-close-btn{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.04);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--brand);transition:all 0.2s;}
        .info-close-btn:hover{background:rgba(100,9,12,0.08);}
        .info-close-zone{font-size:11px;font-weight:700;padding:4px 12px;border-radius:12px;}
        .info-img{width:100%;height:200px;object-fit:cover;display:block;}
        .info-body{padding:20px 22px 24px;}
        .info-name{font-size:28px;font-weight:900;margin-bottom:2px;}
        .info-en{font-size:13px;color:#aaa;margin-bottom:12px;direction:ltr;}

        /* Card sections */
        .info-section{margin-bottom:16px;}
        .info-section-title{font-size:12px;font-weight:700;color:var(--gd);letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:5px;padding-bottom:4px;border-bottom:1px solid rgba(0,0,0,0.04);}
        .info-desc{font-size:14px;color:#555;line-height:1.85;}
        .info-bullets{list-style:none;padding:0;}
        .info-bullets li{font-size:13px;color:#555;line-height:1.7;padding:2px 0;padding-right:14px;position:relative;}
        .info-bullets li::before{content:'·';position:absolute;right:0;color:var(--gold);font-weight:900;font-size:18px;line-height:1.4;}
        .info-quote{font-size:14px;color:var(--brand);font-weight:600;background:rgba(100,9,12,0.03);padding:10px 14px;border-radius:8px;border-right:3px solid var(--gold);line-height:1.7;}

        /* Stats grid */
        .info-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin:10px 0;}
        .info-stat{background:var(--cream);border-radius:10px;padding:10px 8px;text-align:center;}
        .is-val{font-size:18px;font-weight:900;direction:ltr;display:inline-block;}
        .is-label{font-size:9px;color:#999;margin-top:2px;}

        /* Price box */
        .info-price-box{border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
        .ip-val{font-size:28px;font-weight:900;direction:ltr;display:inline-block;}
        .ip-arrow{font-size:18px;opacity:0.25;}
        .ip-unit{font-size:9px;color:#999;display:block;margin-top:1px;}
        .ip-roi{font-size:24px;font-weight:900;opacity:0.5;margin-right:auto;}

        /* Chips */
        .info-chips{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0;}
        .info-chip{padding:4px 10px;border-radius:7px;font-size:10px;font-weight:600;background:rgba(0,0,0,0.03);}

        /* Nav between cards */
        .info-nav{display:flex;gap:6px;padding:14px 22px;border-top:1px solid rgba(0,0,0,0.04);}
        .info-nav-btn{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(0,0,0,0.05);background:#fff;font-family:'Tajawal';font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.2s;color:var(--brand);}
        .info-nav-btn:hover{background:var(--sand);border-color:var(--gold);}

        /* Pulse */
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(156,5,18,0.25);}50%{box-shadow:0 0 0 10px rgba(156,5,18,0);}}

        /* Map nodes */
        .node-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;border:2.5px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,0.25);transition:all 0.3s;cursor:pointer;}
        .node-dot.active{animation:pulse 2s infinite;}
        .node-label{background:rgba(255,255,255,0.94);border-radius:5px;padding:3px 8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);border:1px solid rgba(0,0,0,0.05);white-space:nowrap;font-size:11px;font-weight:700;position:absolute;}

        /* Scrollbar */
        .info-card::-webkit-scrollbar{width:3px;}
        .info-card::-webkit-scrollbar-track{background:transparent;}
        .info-card::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}

        /* ════════════════════════════════════
           RESPONSIVE
           ════════════════════════════════════ */
        @media(max-width:768px){
            .topbar{padding:6px 12px;flex-wrap:wrap;gap:6px;}
            .topbar-stats{display:none;}
            .topbar-title{font-size:14px;}
            .topbar-sub{font-size:9px;}
            .topbar-logo{height:28px;}
            .btn-play{padding:7px 12px;font-size:11px;}
            .legend-panel{bottom:8px;right:8px;padding:10px 12px;min-width:170px;max-width:45vw;}
            .leg-row{font-size:9px;}
            .journey-bar{right:185px;left:50px;bottom:8px;padding:8px 10px;}
            .j-dot{width:20px;height:20px;font-size:6px;}
            .zoom-ctrl{bottom:70px;left:8px;}
            .zoom-btn{width:34px;height:34px;font-size:16px;}
            .info-overlay{width:100vw;}
            .info-img{height:160px;}
            .info-body{padding:16px 18px 20px;}
            .info-name{font-size:24px;}
        }
        @media(max-width:480px){
            .topbar-left .btn-icon{display:none;}
            .topbar{gap:4px;}
            .legend-panel{display:none;}
            .journey-bar{right:8px;left:8px;bottom:8px;}
            .zoom-ctrl{bottom:60px;}
            .info-name{font-size:22px;}
            .info-img{height:140px;}
            .info-stats{grid-template-columns:1fr 1fr;}
        }
    </style>
</head>

<!-- ══ TOP BAR ══ -->

        <div class="leg-row"><span class="leg-dash" style="border-color:var(--dirab)"></span>محور ديراب 🐎</div>

</div>

<div class="journey-bar" id="journeyBar"><div class="j-stops" id="jStops"></div></div>

<div class="info-backdrop" id="infoBg" onclick="closeInfo()"></div>
<div class="info-overlay" id="infoPanel">
    <div class="info-card" id="infoCard"></div>
</div>

    let currentInfo=-1;

    function renderSections(sections,c){
        let html='';
        sections.forEach(s=>{
            html+=`<div class="info-section"><div class="info-section-title">${s.icon} ${s.title}</div>`;
            if(s.type==='text') html+=`<div class="info-desc">${s.text}</div>`;
            else if(s.type==='quote') html+=`<div class="info-quote">${s.text}</div>`;
            else if(s.type==='bullets'){
                html+=`<ul class="info-bullets">`;
                s.items.forEach(it=>{html+=`<li>${it}</li>`;});
                html+=`</ul>`;
            }
            else if(s.type==='price'){
                html+=`<div class="info-price-box" style="background:${zBg[currentLoc().zone]};">
        <div><div class="ip-val" style="color:#bbb;">${s.old}</div><div class="ip-unit">${s.oldYear||'سابقاً'}</div></div>
        <div class="ip-arrow">←</div>
        <div><div class="ip-val" style="color:${c};">${s.new}</div><div class="ip-unit">اليوم</div></div>
        ${s.roi?`<div class="ip-roi" style="color:${c};">${s.roi}</div>`:''}
      </div><div style="text-align:center;font-size:10px;color:#bbb;margin-top:2px;">${s.unit||'ريال / م²'}</div>`;
            }
            else if(s.type==='stats'){
                html+=`<div class="info-stats">`;
                s.items.forEach(st=>{html+=`<div class="info-stat"><div class="is-val" style="color:${c};">${st.v}</div><div class="is-label">${st.l}</div></div>`;});
                html+=`</div>`;
            }
            html+=`</div>`;
        });
        return html;
    }

        h+=`<div class="info-chips">`;

        document.getElementById('playText').textContent='إيقاف';
        playStep();
    }
    function stopJ(){
        jPlaying=false;clearTimeout(jTimer);
        document.getElementById('playBtn').classList.remove('playing');
        document.getElementById('playIcon').textContent='▶';
        document.getElementById('playText').textContent='تشغيل الرحلة';
    }
    function playStep(){
        if(!jPlaying||jIdx>=L_.length){stopJ();return;}
        openInfo(jIdx);jIdx++;jTimer=setTimeout(playStep,4500);
    }
    function resetView(){closeInfo();stopJ();map.fitBounds(bounds.pad(0.08),{duration:1});updateJourneyDots(-1);}
    function toggleLegend(){
        const p=document.getElementById('legendPanel'),t=document.getElementById('legToggle');
        p.classList.toggle('collapsed');t.textContent=p.classList.contains('collapsed')?'▲':'▼';
    }
</script>
</body>
</html>
